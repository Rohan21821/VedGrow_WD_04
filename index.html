<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Header -->

        <header>

            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather Dashboard
            </h1>

            <p>
                Real-time weather & forecast
            </p>

        </header>

        <button id="themeBtn">
        🌙 Dark Mode
        </button>

        <button id="locationBtn">
        📍 Use My Location
        </button>

        <!-- Search Area -->

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Search city...">

            <button id="searchBtn">
                <i class="fas fa-search"></i>
            </button>

        </div>

        <!-- Autocomplete Suggestions -->

        <div id="suggestions"></div>

        <!-- Unit Toggle -->

        <div class="unit-toggle">

            <button id="celsiusBtn">
                °C
            </button>

            <button id="fahrenheitBtn">
                °F
            </button>

        </div>

        <div id="loader" class="loader">
        Loading Weather...
        </div>
        <!-- Current Weather -->

        <div id="errorBox"></div>
        <section id="currentWeather" class="weather-card">

            <img id="countryFlag">
            <h2 id="cityName">
                Search a city
            </h2>

            <div id="dateTime"></div>

            <img id="weatherIcon" alt="Weather Icon">

            <h3 id="temperature">
                --
            </h3>

            <p id="description">
                Weather description
            </p>

            <button id="favoriteBtn">
            ⭐ Add to Favorites
            </button>

            <div class="weather-details">
                <div>
                🌅 Sunrise:
                <span id="sunrise">--</span>
                </div>

                <div>
                🌇 Sunset:
                <span id="sunset">--</span>
                </div>

                <div>
                🌡 Feels Like:
                <span id="feelsLike">--</span>
                </div>

                <div>
                    💧 Humidity:
                    <span id="humidity">--</span>
                </div>

                <div>
                    🌬 Wind:
                    <span id="wind">--</span>
                </div>

                <div>
                    📊 Pressure:
                    <span id="pressure">--</span>
                </div>


                <div>
                    ☀ UV:
                    <span id="uvIndex">--</span>
                </div>

                <div>
                    🌫 AQI:
                    <span id="aqi">--</span>
                </div>

                <div>
                    👀 Visibility:
                    <span id="visibility">--</span>
                </div>

            </div>

        </section>

        <!-- Favourite Cities -->

        <section class="favorites">

            <h2>
                ⭐ Favourite Cities
            </h2>

            <div id="favoritesList"></div>

        </section>

        <section>

        <h2>
        🕒 Recent Searches
        </h2>

        <div id="recentSearches"></div>

</section>

        <!-- Forecast -->

        <section>

            <h2>
                5-Day Forecast
            </h2>

            <div id="forecastContainer"></div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
